version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: prompts
      POSTGRES_PASSWORD: prompts_dev
      POSTGRES_DB: prompts_service
    ports:
      - "5436:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prompts -d prompts_service"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
